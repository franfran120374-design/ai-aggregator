<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrégateur IA</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2e38;
    --text: #e8e9ec;
    --muted: #8b8f9a;
    --accent: #4f7cff;
    --user-bubble: #2a3550;
    --bot-bubble: #1f232c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .status { font-size: 12px; color: var(--muted); }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }
  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 3px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bot-bubble);
    border-bottom-left-radius: 3px;
  }
  .msg.error {
    align-self: flex-start;
    background: #402226;
    color: #ff9b9b;
  }
  .meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .msg.user .meta { text-align: right; }
  #composer {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    background: var(--panel);
  }
  #composer form {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #prompt {
    flex: 1;
    resize: none;
    background: #1c1f27;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    max-height: 160px;
    min-height: 44px;
  }
  #prompt:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    height: 44px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .typing { color: var(--muted); font-style: italic; }
  .options {
    max-width: 800px;
    margin: 0 auto 8px;
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--muted);
    align-items: center;
  }
  .options label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>Agrégateur IA</h1>
  <span class="status" id="status-line">chargement du statut…</span>
</header>

<div id="messages"></div>

<div id="composer">
  <div class="options">
    <label><input type="checkbox" id="team-toggle"> Mode équipe (Claude planifie et relit, un modèle gratuit exécute)</label>
    <label><input type="checkbox" id="premium-toggle"> Mode premium (payant, Claude/GPT)</label>
    <select id="premium-provider">
      <option value="anthropic">Claude</option>
      <option value="openai">GPT</option>
    </select>
  </div>
  <form id="chat-form">
    <textarea id="prompt" placeholder="Écris ton message… (Entrée pour envoyer, Maj+Entrée pour une nouvelle ligne)" rows="1"></textarea>
    <button type="submit" id="send-btn">Envoyer</button>
  </form>
</div>

<script>
const messagesEl = document.getElementById("messages");
const form = document.getElementById("chat-form");
const promptEl = document.getElementById("prompt");
const sendBtn = document.getElementById("send-btn");
const teamToggle = document.getElementById("team-toggle");
const premiumToggle = document.getElementById("premium-toggle");
const premiumProvider = document.getElementById("premium-provider");
const statusLine = document.getElementById("status-line");

function getAccessToken() {
  let token = localStorage.getItem("accessToken");
  if (!token) {
    token = window.prompt("Code d'accès :") || "";
    localStorage.setItem("accessToken", token);
  }
  return token;
}

function authHeaders(extra) {
  return Object.assign({ "X-Access-Token": getAccessToken() }, extra || {});
}

function addMessage(role, text, meta) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  if (meta) {
    const metaEl = document.createElement("div");
    metaEl.className = "meta";
    metaEl.textContent = meta;
    div.appendChild(metaEl);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

promptEl.addEventListener("input", () => {
  promptEl.style.height = "auto";
  promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + "px";
});

promptEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    form.requestSubmit();
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = promptEl.value.trim();
  if (!text) return;

  addMessage("user", text);
  promptEl.value = "";
  promptEl.style.height = "auto";
  sendBtn.disabled = true;

  const isTeam = teamToggle.checked;
  const typingEl = addMessage("bot", isTeam ? "L'équipe travaille (plan → exécution → relecture)… ça peut prendre 1 à 3 minutes." : "…");
  typingEl.classList.add("typing");

  const body = { prompt: text };
  if (!isTeam && premiumToggle.checked) {
    body.premium = true;
    body.premium_provider = premiumProvider.value;
  }

  try {
    const resp = await fetch(isTeam ? "/team" : "/chat", {
      method: "POST",
      headers: authHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    typingEl.classList.remove("typing");

    if (resp.status === 401) {
      localStorage.removeItem("accessToken");
      typingEl.className = "msg error";
      typingEl.textContent = "Code d'accès invalide. Recharge la page pour le ressaisir.";
    } else if (!resp.ok) {
      typingEl.className = "msg error";
      typingEl.textContent = data.detail || "Erreur inconnue.";
    } else {
      typingEl.textContent = data.response;
      let metaText;
      if (isTeam) {
        metaText = data.steps
          .map((s) => `${s.step}: ${s.provider}${s.model ? " / " + s.model : ""}`)
          .join(" · ") + ` (${data.category})`;
      } else {
        metaText = `${data.provider} / ${data.model} (${data.category})`;
      }
      if (data.cost_usd !== null && data.cost_usd !== undefined) {
        metaText += ` — $${data.cost_usd.toFixed(4)}`;
      }
      const metaEl = document.createElement("div");
      metaEl.className = "meta";
      metaEl.textContent = metaText;
      typingEl.appendChild(metaEl);
    }
  } catch (err) {
    typingEl.classList.remove("typing");
    typingEl.className = "msg error";
    typingEl.textContent = "Impossible de contacter le serveur : " + err.message;
  } finally {
    sendBtn.disabled = false;
    refreshStatus();
  }
});

async function refreshStatus() {
  try {
    const resp = await fetch("/status", { headers: authHeaders() });
    if (resp.status === 401) {
      statusLine.textContent = "code d'accès invalide";
      return;
    }
    const data = await resp.json();
    const parts = Object.entries(data.quota)
      .filter(([name, q]) => q.rpd_limit > 0)
      .map(([name, q]) => {
        let s = `${name}: ${q.rpd_used}/${q.rpd_limit} req`;
        if (q.tpm_limit) s += `, ${q.tpm_used}/${q.tpm_limit} tok/min`;
        return s;
      })
      .join(" · ");
    statusLine.textContent = parts + ` · budget: $${data.budget.remaining_usd.toFixed(2)} restant`;
  } catch (err) {
    statusLine.textContent = "statut indisponible";
  }
}

refreshStatus();
</script>
</body>
</html>
